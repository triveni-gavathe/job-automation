


{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow p-4">
            <h3>Forget Password</h3>
            <p>Enter your username and we will send an OTP to your email</p>

            {% if messages %}
                {% for message in messages %}
                <div class="alert alert-{{ message.tags }}">
                    {{ message }}
                </div>
                {% endfor %}
            {% endif %}

            <form action="" method="POST">
                {% csrf_token %}
                <label for="uname_">Username</label>
                <input type="text" name="uname" id="uname_"
                    class="form-control mb-3"
                    placeholder="Enter your username" required>
                <button type="submit" class="btn btn-primary w-100">
                    Send OTP
                </button>
            </form>

            <p class="mt-3">Remember password?
                <a href="{% url 'login_' %}">Login here</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
